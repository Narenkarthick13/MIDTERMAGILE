<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Timetable</title>
<style>
    body { font-family: Arial, sans-serif; background-color: #f4f4f9; padding: 20px; }
    h2 { text-align: center; color: #333; }
    
    table {
        width: 100%;
        max-width: 1000px;
        margin: 20px auto;
        border-collapse: collapse;
        background-color: white;
        box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }
    
    th, td {
        border: 1px solid #ddd;
        padding: 15px;
        text-align: center;
    }
    
    th { background-color: #4CAF50; color: white; }
    tr:nth-child(even) { background-color: #f2f2f2; }
    tr:hover { background-color: #ddd; }
    
    .subject { font-weight: bold; color: #333; }
    .break { background-color: #ffeb3b; color: #333; font-style: italic; }
</style>
</head>
<body>

<h2>Weekly Class Timetable</h2>

<table>
    <thead>
        <tr>
            <th>Time</th>
            <th>Monday</th>
            <th>Tuesday</th>
            <th>Wednesday</th>
            <th>Thursday</th>
            <th>Friday</th>
        </tr>
    </thead>
    <tbody>
        <tr>
            <td>09:00 - 10:00</td>
            <td class="subject">Mathematics</td>
            <td class="subject">Physics</td>
            <td class="subject">English</td>
            <td class="subject">History</td>
            <td class="subject">Chemistry</td>
        </tr>
        <tr>
            <td>10:00 - 11:00</td>
            <td class="subject">Physics</td>
            <td class="subject">Computer Sci</td>
            <td class="subject">Mathematics</td>
            <td class="subject">English</td>
            <td class="subject">Physical Ed</td>
        </tr>
        <tr>
            <td>11:00 - 11:30</td>
            <td colspan="5" class="break">Break Time</td>
        </tr>
        <tr>
            <td>11:30 - 12:30</td>
            <td class="subject">Chemistry</td>
            <td class="subject">Mathematics</td>
            <td class="subject">History</td>
            <td class="subject">Computer Sci</td>
            <td class="subject">Library</td>
        </tr>
    </tbody>
</table>

</body>
</html>
